name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — typecheck, unit tests, migrations, build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: resume_studio
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Values env.ts requires at import time. Not secrets — CI only.
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/resume_studio
      AUTH_SECRET: ci-only-secret-not-used-in-production
      AI_PROVIDER: ollama

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Apply migrations to a fresh database
        run: npx prisma migrate deploy
      - name: Unit tests (Vitest)
        run: npm test
      - name: Build (also typechecks)
        run: npm run build

  frontend:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - name: Build (tsc -b && vite build)
        run: npm run build
