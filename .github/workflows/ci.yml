name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — typecheck, unit tests, migrations, build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: resume_studio
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Values env.ts requires at import time. Not secrets — CI only.
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/resume_studio
      AUTH_SECRET: ci-only-secret-not-used-in-production
      AI_PROVIDER: ollama

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Apply migrations to a fresh database
        run: npx prisma migrate deploy
      - name: Unit tests (Vitest)
        run: npm test
      - name: Build (also typechecks)
        run: npm run build

  frontend:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - name: Build (tsc -b && vite build)
        run: npm run build

  e2e:
    name: E2E — Playwright (mock AI provider)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: resume_studio
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/resume_studio
      AUTH_SECRET: ci-only-secret-not-used-in-production
      AI_PROVIDER: mock
      PORT: "4001"
      FRONTEND_ORIGIN: http://localhost:5173
      VITE_API_BASE_URL: http://localhost:4001
      BASE_URL: http://localhost:5173

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Backend — install, migrate, build
        working-directory: backend
        run: |
          npm ci
          npx prisma generate
          npx prisma migrate deploy
          npm run build

      - name: Start backend (mock provider)
        working-directory: backend
        run: |
          nohup node dist/server.js > backend.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:4001/api/health && break
            sleep 2
          done
          curl -sf http://localhost:4001/api/health || { echo "backend did not start"; cat backend.log; exit 1; }

      - name: Frontend — build and serve
        working-directory: frontend
        run: |
          npm ci
          npm run build
          nohup npx vite preview --port 5173 --strictPort > frontend.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:5173 >/dev/null && break
            sleep 2
          done
          curl -sf http://localhost:5173 >/dev/null || { echo "frontend did not start"; cat frontend.log; exit 1; }

      - name: E2E — install deps and browser
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: E2E — run Playwright
        working-directory: e2e
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
